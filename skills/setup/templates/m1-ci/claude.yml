name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@1dc994ee7a008f0ecc866d9ac23ef036b7229f84 # v1.0.127
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Lets Claude read CI results on PRs.
          additional_permissions: |
            actions: read

          # --allowedTools is ADDITIVE: the base file-edit + GitHub tools are
          # always available; this only pre-approves writing skill docs under
          # .claude/skills/ in the headless CI context, which is otherwise
          # blocked (so @claude runs can patch the project skills themselves).
          # Deliberately scoped to .claude/skills/** and to native Edit/Write
          # only — NOT .claude/hooks or .claude/settings.json (those run shell
          # on the runner) and no Bash grant, so there is no arbitrary-code
          # surface. Specifiers are space-free to tokenize.
          claude_args: '--allowedTools Edit(.claude/skills/**) Write(.claude/skills/**)'
