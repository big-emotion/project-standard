name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    # Dogfoods M1 and guards the no-secret-values rule: this repo documents
    # secret names and real infra coordinates, so an accidental value paste
    # must fail CI.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run gitleaks
        run: >
          docker run --rm -v "${{ github.workspace }}:/repo" -w /repo
          zricethezav/gitleaks@sha256:0e99e8821643ea5b235718642b93bb32486af9c8162c8b8731f7cbdc951a7f46
          detect --source . --no-git --config .gitleaks.toml --redact --no-banner

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6e6efb713b8e07dc4611e5a63565040a8de50c69 # v6.2.0
        with:
          node-version: "24"
      - run: npm test
      - run: npm run check:templates
      - name: Validate plugin manifests are parseable JSON
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8')); JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'))"
